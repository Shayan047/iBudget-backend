version: '3.9'

services:
  db:
    image: postgres:15
    container_name: iBudget_fastAPI_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB: iBudget_fastAPI_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: