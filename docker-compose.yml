version: '3.9'

services:
  db:
    image: postgres:15
    container_name: iBudget_fastAPI_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB: iBudget_fastAPI_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    container_name: iBudget_redis
    restart: always
    ports:
      - "6379:6379"

  redis-insight:
    image: redis/redisinsight:latest
    container_name: iBudget_redis_insight
    restart: always
    ports:
      - "5540:5540"
    volumes:
      - redis_insight_data:/data

volumes:
  postgres_data:
  redis_insight_data:
